  <script>
    function showMessage(containerId, message, type) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = `<div class="message ${type}">${message}</div>`;
      if (type === 'success') setTimeout(() => { container.innerHTML = ''; }, 5000);
    }

    let currentTab = 'dashboard';

    // Vars
    let todosLosClientes = [];
    let clientesFiltrados = [];
    let filtroClienteTimeout;
    let editandoCliente = false;
    let clientesCaja = [];
    let componentesKit = [];
    let editandoKit = false;
    let kitsDisponibles = [];
    let kitsMap = {};
    let rentaCargada = null;
    let lineasCheck = [];
    let ventaCargada = null;
    let borradoresMov = [];
    let autocompleteTimeout;
    let productosCaja = [];
    let guardandoCaja = false;

    // Logo selección
    let logoSeleccionado = null;

    function initializeApp() {
      cargarParametrosParaUI();

      cargarClaveCliente();
      loadListas();
      loadDashboard();
      cargarKits();
      cargarKitCodigo();
      cargarCajaInicial();
      const inputFecha = document.getElementById("fechaMov");
      if(inputFecha) inputFecha.valueAsDate = new Date();
      setDefaultReportDates();
      showTab('dashboard');
    }

    function cargarParametrosParaUI() {
      google.script.run.withSuccessHandler(p => {
        if (p && p.logoUrl) aplicarLogoEnUI(p.logoUrl);
      }).obtenerParametros();
    }

    function aplicarLogoEnUI(logoUrl) {
      const img = document.getElementById("sidebarLogo");
      if (!img) return;
      if (!logoUrl) return;

      const finalUrl = logoUrl + (logoUrl.includes("?") ? "&" : "?") + "v=" + Date.now();

      img.onerror = () => {
        img.onerror = null;
        img.src = "https://lh3.googleusercontent.com/d/1e9ki2xO6zgPsnCYEijV0VqI8szbCxIlY";
      };

      img.src = finalUrl;

      const prev = document.getElementById("logoPreview");
      if (prev && prev.style.display === "block") prev.src = finalUrl;
    }

    function setDefaultReportDates() {
      const today = new Date();
      const monthAgo = new Date();
      monthAgo.setMonth(monthAgo.getMonth() - 1);
      const fd = document.getElementById("fechaDesde");
      const fh = document.getElementById("fechaHasta");
      if(fd) fd.valueAsDate = monthAgo;
      if(fh) fh.valueAsDate = today;
    }

    function showTab(tabName, evt) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
      const tabEl = document.getElementById(tabName);
      if (tabEl) tabEl.classList.add('active');
      const linkEl = evt ? evt.currentTarget || evt.target : null;
      if (linkEl && linkEl.classList) linkEl.classList.add('active');

      currentTab = tabName;
      if(tabName === 'checkRentas') listarRentas();
      if(tabName === 'checkVentas') listarVentas();
      if(tabName === 'clientes' && todosLosClientes.length === 0) mostrarClientes();
      if(tabName === 'dashboard') loadDashboard();
      if(tabName === 'kits') { if(!editandoKit) cargarKitCodigo(); cargarKits(); }
      if(tabName === 'inventario') mostrarStock();
      if(tabName === 'caja') cargarCajaInicial();
    }

    function loadListas() {
      google.script.run.withSuccessHandler(data => {
        const unidadSelect = document.getElementById("unidadProd");
        const grupoSelect  = document.getElementById("grupoProd");
        if (unidadSelect) unidadSelect.innerHTML = "";
        if (grupoSelect)  grupoSelect.innerHTML  = "";
        (data.unidades || []).forEach(u => unidadSelect && (unidadSelect.innerHTML += `<option value="${u}">${u}</option>`));
        (data.grupos   || []).forEach(g => grupoSelect  && (grupoSelect.innerHTML  += `<option value="${g}">${g}</option>`));
      }).obtenerListas();
    }

    function loadDashboard() {
      google.script.run.withSuccessHandler(data => {
        const statsGrid = document.getElementById('statsGrid');
        if (!statsGrid) return;
        statsGrid.innerHTML = `
          <div class="stat-card"><div class="stat-value">${data.totalProductos}</div><div class="stat-label">Total Productos</div></div>
          <div class="stat-card"><div class="stat-value">${data.totalMovimientos}</div><div class="stat-label">Total Movimientos</div></div>
          <div class="stat-card"><div class="stat-value">${data.sinStock}</div><div class="stat-label">Sin Stock</div></div>
          <div class="stat-card"><div class="stat-value">${data.stockBajo}</div><div class="stat-label">Stock Bajo</div></div>
        `;
      }).obtenerResumen();
    }

    function showStockAlerts() {
      google.script.run.withSuccessHandler(data => {
        const alertProducts = data.filter(p => p.cantidad <= 0 || (p.cantidad <= p.stockMin && p.stockMin > 0));
        const container = document.getElementById('alertsContainer');
        if (alertProducts.length === 0) { container.innerHTML = '<div class="message success">No hay productos con alertas de stock</div>'; return; }
        let html = `<div class="message warning"><strong>${alertProducts.length} producto(s) requieren atención</strong></div><table><thead><tr><th>Código</th><th>Nombre</th><th>Stock Actual</th><th>Stock Mín.</th><th>Estado</th></tr></thead><tbody>`;
        alertProducts.forEach(p => {
          const estado = p.cantidad <= 0 ? 'Sin Stock' : 'Stock Bajo';
          const statusClass = p.cantidad <= 0 ? 'status-zero' : 'status-low';
          html += `<tr class="${statusClass}"><td>${p.codigo}</td><td>${p.nombre}</td><td>${p.cantidad}</td><td>${p.stockMin}</td><td>${estado}</td></tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
      }).obtenerStock();
    }

    /* ------------------- CLIENTES ------------------- */
    function cargarClaveCliente() {
      google.script.run.withSuccessHandler(clave => {
        if (clave && document.getElementById('cliClave')) document.getElementById('cliClave').value = clave;
      }).obtenerClaveCliente();
    }

    function registrarCliente(e) {
      e.preventDefault();
      const cliente = {
        clave: cliClave.value.trim().toUpperCase(),
        nombre: cliNombre.value.trim(),
        telefono: cliTelefono.value.trim(),
        email: cliEmail.value.trim(),
        direccion: cliDireccion.value.trim()
      };
      if (!cliente.nombre) { showMessage('msgCliente', 'Nombre es obligatorio', 'error'); return; }
      if (editandoCliente) {
        google.script.run.withSuccessHandler(msg => {
          const tipo = msg.includes('correctamente') ? 'success' : 'error';
          showMessage('msgCliente', msg, tipo);
          if (tipo === 'success') { limpiarFormCliente(); mostrarClientes(); cerrarFormClienteModal(); }
        }).withFailureHandler(err => showMessage('msgCliente', err, 'error')).actualizarCliente(cliente);
      } else {
        google.script.run.withSuccessHandler(msg => {
          const tipo = msg.includes('correctamente') ? 'success' : 'error';
          showMessage('msgCliente', msg, tipo);
          if (tipo === 'success') { limpiarFormCliente(); cargarClaveCliente(); mostrarClientes(); cerrarFormClienteModal(); }
        }).withFailureHandler(err => showMessage('msgCliente', err, 'error')).registrarCliente(cliente);
      }
    }

    function limpiarFormCliente() {
      document.getElementById('formCliente').reset();
      document.getElementById('msgCliente').innerHTML = '';
      editandoCliente = false;
      document.getElementById('btnClienteGuardar').textContent = '💾 Guardar';
      document.getElementById('cliClave').readOnly = true;
      document.getElementById('cliClave').style.background = '#f5f5f5';
      cargarClaveCliente();
      _setFotoClienteUiEnabled_(false);
      limpiarFotoClienteSeleccionada();
      document.getElementById('cliFotoActualContainer').style.display = 'none';
      document.getElementById('msgFotoCliente').innerHTML = '';
    }

    function mostrarClientes() {
      google.script.run.withSuccessHandler(data => { todosLosClientes = data; filtrarClientesEnTiempoReal(); })
        .withFailureHandler(err => showMessage('tablaClientes', 'Error al cargar clientes: ' + err, 'error'))
        .obtenerClientes();
    }

    function filtrarClientesEnTiempoReal() {
      clearTimeout(filtroClienteTimeout);
      filtroClienteTimeout = setTimeout(() => {
        const textoFiltro = document.getElementById('filtroClienteTexto').value.toLowerCase().trim();
        const estadoFiltro = document.getElementById('filtroClienteEstado').value.toUpperCase();
        clientesFiltrados = todosLosClientes.filter(c => {
          const coincideTexto = !textoFiltro || c.clave.toLowerCase().includes(textoFiltro) || c.nombre.toLowerCase().includes(textoFiltro) || c.telefono.toLowerCase().includes(textoFiltro) || c.email.toLowerCase().includes(textoFiltro);
          const coincideEstado = !estadoFiltro || c.estado.toUpperCase() === estadoFiltro;
          return coincideTexto && coincideEstado;
        });
        renderizarTablaClientes(clientesFiltrados);
      }, 300);
    }

    function renderizarTablaClientes(data) {
      const container = document.getElementById('tablaClientes');
      const contador = document.getElementById('contadorClientes');
      if (contador) contador.textContent = `(${data.length} ${data.length === 1 ? 'cliente' : 'clientes'})`;
      if (data.length === 0) { container.innerHTML = '<div class="message warning">No se encontraron clientes con los filtros aplicados</div>'; return; }
      let html = `<table><thead><tr><th>Clave</th><th>Nombre</th><th>Teléfono</th><th>Email</th><th>Dirección</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>`;
      data.forEach(c => {
        const estadoBadge = c.estado === 'ACTIVO'
          ? '<span style="background:#d4edda; color:#155724; padding:4px 8px; border-radius:4px; font-size:0.8rem;">✓ Activo</span>'
          : '<span style="background:#f8d7da; color:#721c24; padding:4px 8px; border-radius:4px; font-size:0.8rem;">✗ Inactivo</span>';

        html += `<tr><td><strong>${c.clave}</strong></td><td>${c.nombre}</td><td>${c.telefono || '-'}</td><td>${c.email || '-'}</td><td>${c.direccion || '-'}</td><td>${estadoBadge}</td>
          <td style="white-space: nowrap;">
            <button class="btn btn-info" onclick="verDetalleCliente('${c.clave}')" title="Ver detalle" style="padding:8px 12px; font-size:0.8rem;">👁️</button>
            <button class="btn btn-warning" onclick="editarCliente('${c.clave}')" title="Editar" style="padding:8px 12px; font-size:0.8rem;">✏️</button>
            ${c.estado === 'ACTIVO'
              ? `<button class="btn btn-danger" onclick="confirmarBajaCliente('${c.clave}')" title="Dar de baja" style="padding:8px 12px; font-size:0.8rem;">🗑️</button>`
              : `<button class="btn btn-success" onclick="reactivarCliente('${c.clave}')" title="Reactivar" style="padding:8px 12px; font-size:0.8rem;">✓</button>`
            }
          </td></tr>`;
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    }

    function limpiarFiltrosClientes() {
      document.getElementById('filtroClienteTexto').value = '';
      document.getElementById('filtroClienteEstado').value = 'ACTIVO';
      filtrarClientesEnTiempoReal();
    }

    function exportarClientes() {
      if (clientesFiltrados.length === 0) { alert('No hay clientes para exportar'); return; }
      let csv = '\uFEFF';
      csv += 'Clave,Nombre,Teléfono,Email,Dirección,Estado\n';
      clientesFiltrados.forEach(c => { csv += `"${c.clave}","${c.nombre}","${c.telefono}","${c.email}","${c.direccion}","${c.estado}"\n`; });
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a'); a.style.display = 'none'; a.href = url;
      a.download = `Clientes_${new Date().toISOString().split('T')[0]}.csv`;
      document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url);
    }

    function verDetalleCliente(clave) {
      const cliente = todosLosClientes.find(c => c.clave === clave);
      if (!cliente) { alert('Cliente no encontrado'); return; }
      document.getElementById('dcClave').textContent = cliente.clave;
      document.getElementById('dcNombre').textContent = cliente.nombre;
      document.getElementById('dcTelefono').textContent = cliente.telefono || 'No registrado';
      document.getElementById('dcEmail').textContent = cliente.email || 'No registrado';
      document.getElementById('dcDireccion').textContent = cliente.direccion || 'No registrada';
      document.getElementById('dcEstado').textContent = cliente.estado;
      const img = document.getElementById('clienteDetalleImg');
      const sinFoto = document.getElementById('clienteDetalleSinFoto');
      const fotoLink = document.getElementById('dcFotoLink');
      if (cliente.fotoUrl) {
        img.onerror = function() { this.style.display = 'none'; sinFoto.style.display = 'inline-flex'; fotoLink.style.display = 'none'; };
        img.src = cliente.fotoUrl;
        img.style.display = 'inline-block';
        sinFoto.style.display = 'none';
        fotoLink.href = cliente.fotoUrl;
        fotoLink.style.display = 'inline';
      } else {
        img.src = '';
        img.style.display = 'none';
        sinFoto.style.display = 'inline-flex';
        fotoLink.style.display = 'none';
      }
      document.getElementById('clienteDetalleModal').style.display = 'block';
    }

    function cerrarDetalleClienteModal() {
      document.getElementById('clienteDetalleModal').style.display = 'none';
    }

    function abrirFormClienteModal() {
      limpiarFormCliente();
      document.getElementById('clienteFormModalTitle').textContent = '➕ Registrar Cliente';
      document.getElementById('clienteFormModal').style.display = 'block';
    }

    function cerrarFormClienteModal() {
      document.getElementById('clienteFormModal').style.display = 'none';
    }

    function editarCliente(clave) {
      const cliente = todosLosClientes.find(c => c.clave === clave);
      if (!cliente) return;
      editandoCliente = true;
      document.getElementById('cliClave').value = cliente.clave;
      document.getElementById('cliNombre').value = cliente.nombre;
      document.getElementById('cliTelefono').value = cliente.telefono || '';
      document.getElementById('cliEmail').value = cliente.email || '';
      document.getElementById('cliDireccion').value = cliente.direccion || '';
      document.getElementById('btnClienteGuardar').textContent = 'Actualizar';
      showMessage('msgCliente', `Editando cliente ${cliente.clave}`, 'info');
      _setFotoClienteUiEnabled_(true);
      limpiarFotoClienteSeleccionada();
      const fotoActualContainer = document.getElementById('cliFotoActualContainer');
      const fotoActualLink = document.getElementById('cliFotoActualLink');
      const fotoActualImg = document.getElementById('cliFotoActualImg');
      if (cliente.fotoUrl) {
        fotoActualLink.href = cliente.fotoUrl;
        if (fotoActualImg) {
          fotoActualImg.onerror = function() { this.style.display = 'none'; };
          fotoActualImg.style.display = 'block';
          fotoActualImg.src = cliente.fotoUrl;
        }
        fotoActualContainer.style.display = 'block';
      } else {
        if (fotoActualImg) fotoActualImg.src = '';
        fotoActualContainer.style.display = 'none';
      }
      document.getElementById('clienteFormModalTitle').textContent = '✏️ Editar Cliente';
      document.getElementById('clienteFormModal').style.display = 'block';
    }

    function confirmarBajaCliente(clave) {
      if (confirm(`¿Desea dar de BAJA al cliente ${clave}?`)) {
        google.script.run.withSuccessHandler(msg => { alert(msg); mostrarClientes(); }).eliminarCliente(clave);
      }
    }

    function reactivarCliente(clave) {
      if (confirm(`¿Desea REACTIVAR al cliente ${clave}?`)) {
        google.script.run.withSuccessHandler(msg => { alert(msg); mostrarClientes(); }).reactivarCliente(clave);
      }
    }

    /* --- FOTO CLIENTE --- */
    function _setFotoClienteUiEnabled_(enabled) {
      // Los controles de foto siempre son visibles; solo reseteamos el estado
      // del botón "Subir" (que se activa al seleccionar archivo).
      const btnSubir = document.getElementById('btnSubirFotoCliente');
      if (!btnSubir) return;
      if (!enabled) {
        btnSubir.disabled = true;
        btnSubir.style.opacity = '0.5';
      }
    }

    function onClienteFotoSelected() {
      const input = document.getElementById('cliInputFoto');
      const preview = document.getElementById('cliPreviewImg');
      const previewContainer = document.getElementById('cliPreviewContainer');
      const btnSubir = document.getElementById('btnSubirFotoCliente');
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          preview.src = e.target.result;
          previewContainer.style.display = 'block';
          btnSubir.disabled = false;
          btnSubir.style.opacity = '1';
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    function limpiarFotoClienteSeleccionada() {
      const input = document.getElementById('cliInputFoto');
      const preview = document.getElementById('cliPreviewImg');
      const previewContainer = document.getElementById('cliPreviewContainer');
      const btnSubir = document.getElementById('btnSubirFotoCliente');
      if (input) input.value = '';
      if (preview) preview.src = '';
      if (previewContainer) previewContainer.style.display = 'none';
      if (btnSubir) { btnSubir.disabled = true; btnSubir.style.opacity = '0.5'; }
    }

    function subirFotoClienteDesdeUI() {
      const input = document.getElementById('cliInputFoto');
      const clave = document.getElementById('cliClave').value.trim().toUpperCase();
      const msgEl = document.getElementById('msgFotoCliente');
      if (!clave) { msgEl.innerHTML = '<span style="color:#dc3545;">Primero guarda el cliente para obtener su clave.</span>'; return; }
      if (!input.files || !input.files[0]) { msgEl.innerHTML = '<span style="color:#dc3545;">Selecciona una foto primero.</span>'; return; }
      const file = input.files[0];
      const reader = new FileReader();
      reader.onload = function(e) {
        const dataUrl = e.target.result;
        const parts = dataUrl.split(',');
        const base64 = parts[1];
        const mimeType = parts[0].split(':')[1].split(';')[0];
        msgEl.innerHTML = '<span style="color:#2E86AB;">⏳ Subiendo foto...</span>';
        google.script.run
          .withSuccessHandler(function(res) {
            if (res && res.ok) {
              msgEl.innerHTML = '<span style="color:#28a745;">✅ Foto subida correctamente.</span>';
              const linkContainer = document.getElementById('cliFotoActualContainer');
              const link = document.getElementById('cliFotoActualLink');
              const img = document.getElementById('cliFotoActualImg');
              if (linkContainer && link) { link.href = res.fotoUrl; if (img) img.src = res.fotoUrl; linkContainer.style.display = 'block'; }
              limpiarFotoClienteSeleccionada();
              mostrarClientes();
            } else {
              msgEl.innerHTML = '<span style="color:#dc3545;">❌ Error: ' + (res ? res.error : 'desconocido') + '</span>';
            }
          })
          .withFailureHandler(function(err) {
            msgEl.innerHTML = '<span style="color:#dc3545;">❌ Error: ' + err + '</span>';
          })
          .subirFotoCliente({ claveCliente: clave, base64: base64, mimeType: mimeType });
      };
      reader.readAsDataURL(file);
    }
    function registrarProducto(event) {
      event.preventDefault();
      const producto = {
        codigo: document.getElementById("codigoProd").value.trim().toUpperCase(),
        nombre: document.getElementById("nombreProd").value.trim(),
        unidad: document.getElementById("unidadProd").value,
        grupo: document.getElementById("grupoProd").value,
        stockMin: parseInt(document.getElementById("stockMinProd").value) || 0
      };
      if (!producto.codigo || !producto.nombre) { showMessage('msgProd', 'Código y nombre son campos obligatorios', 'error'); return; }
      google.script.run.withSuccessHandler(mensaje => {
        showMessage('msgProd', mensaje, mensaje.includes('correctamente') ? 'success' : 'error');
        if (mensaje.includes('correctamente')) { document.getElementById('formProducto').reset(); document.getElementById("stockMinProd").value = "0"; }
      }).withFailureHandler(error => showMessage('msgProd', 'Error: ' + error, 'error')).registrarProducto(producto);
    }
    function limpiarFormProducto() { document.getElementById('formProducto').reset(); document.getElementById("stockMinProd").value = "0"; document.getElementById('msgProd').innerHTML = ''; }

    /* ------------------- KITS ------------------- */
    function cargarKitCodigo() {
      google.script.run.withSuccessHandler(c => { if (!editandoKit && c) document.getElementById('kitCodigo').value = c; }).obtenerCodigoKit();
    }
    function agregarComponenteKit() { componentesKit.push({ codigo: '', cantidad: '', nombre: '' }); renderTablaComponentesKit(); }
    function updateComponenteKit(idx, field, value) { componentesKit[idx][field] = value; }
    function removeComponenteKit(idx) { componentesKit.splice(idx, 1); renderTablaComponentesKit(); }

    function buscarProductoAutocompKit(idx) {
      clearTimeout(componentesKit[idx]?.__t);
      const input = document.getElementById(`compKit-${idx}`);
      const codigo = (input?.value || '').trim().toUpperCase();
      if (!codigo) return;
      componentesKit[idx].__t = setTimeout(() => {
        google.script.run.withSuccessHandler(productos => mostrarAutocompCompKit(idx, productos)).buscarProductoPorCodigo(codigo);
      }, 200);
    }
    function mostrarAutocompCompKit(idx, productos = []) {
      const dropdown = document.getElementById(`autocompleteCompKit-${idx}`);
      if (!dropdown) return;
      if (productos.length === 0) { dropdown.style.display = "none"; return; }
      let html = "";
      productos.forEach(p => {
        html += `<div class="autocomplete-item" onmousedown="seleccionarCompKit(${idx}, '${p.codigo}', '${p.nombre}')"><div class="autocomplete-code">${p.codigo}</div><div class="autocomplete-name">${p.nombre} - ${p.grupo || ''}</div></div>`;
      });
      dropdown.innerHTML = html;
      dropdown.style.display = "block";
    }
    function seleccionarCompKit(idx, codigo, nombre) {
      const input = document.getElementById(`compKit-${idx}`);
      if (input) input.value = codigo;
      componentesKit[idx].codigo = codigo;
      componentesKit[idx].nombre = nombre;
      const dropdown = document.getElementById(`autocompleteCompKit-${idx}`);
      if (dropdown) dropdown.style.display = "none";
    }
    function ocultarAutocompCompKit(idx) { setTimeout(() => { const dropdown = document.getElementById(`autocompleteCompKit-${idx}`); if (dropdown) dropdown.style.display = "none"; }, 150); }

    function renderTablaComponentesKit() {
      const container = document.getElementById('tablaComponentesKit');
      if (!container) return;
      if (componentesKit.length === 0) { container.innerHTML = '<div class="message info">Agregue componentes al kit.</div>'; return; }
      let html = `<table><thead><tr><th>#</th><th>Producto</th><th>Cantidad</th><th></th></tr></thead><tbody>`;
      componentesKit.forEach((c, i) => {
        html += `<tr><td>${i + 1}</td>
          <td>
            <div class="autocomplete-container">
              <input id="compKit-${i}" type="text" value="${c.codigo || ''}" placeholder="Código de producto"
                onkeyup="buscarProductoAutocompKit(${i})"
                onblur="ocultarAutocompCompKit(${i})"
                onfocus="mostrarAutocompCompKit(${i}, [])">
              <div id="autocompleteCompKit-${i}" class="autocomplete-dropdown"></div>
            </div>
          </td>
          <td><input type="number" min="0.01" step="0.01" value="${c.cantidad || ''}" oninput="updateComponenteKit(${i}, 'cantidad', this.value)"></td>
          <td><button class="btn btn-danger" style="padding:6px 10px;font-size:0.8rem" onclick="removeComponenteKit(${i})">🗑️</button></td>
        </tr>`;
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    }

    function limpiarFormKit() {
      editandoKit = false;
      document.getElementById('formKit').reset();
      document.getElementById('msgKit').innerHTML = '';
      componentesKit = [];
      renderTablaComponentesKit();
      cargarKitCodigo();
    }

    function guardarKit(e) {
      e.preventDefault();
      const kit = {
        codigo: document.getElementById('kitCodigo').value.trim().toUpperCase(),
        nombre: document.getElementById('kitNombre').value.trim(),
        descripcion: document.getElementById('kitDescripcion').value.trim(),

    /* ------------------- CAJA REGISTRADORA (ACTUALIZADO) ------------------- */
    function _n(v){ const x = parseFloat(v); return isNaN(x) ? 0 : x; }

    function lineaSubTotal(p){ return _n(p.cantidad) * _n(p.precioUnitario); }
    function lineaDescMonto(p){
      const sub = lineaSubTotal(p);
      let d = _n(p.descMonto);
      if (d < 0) d = 0;
      if (d > sub) d = sub;
      return d;
    }
    function lineaImporte(p){ return Math.max(0, lineaSubTotal(p) - lineaDescMonto(p)); }

    let _descLock = false;

    function syncDescFromPct(idx){
      const p = productosCaja[idx];
      const sub = lineaSubTotal(p);
      let pct = _n(p.descPct);
      if (pct < 0) pct = 0;
      const monto = sub * (pct/100);
      p.descMonto = monto.toFixed(2);
    }

    function syncDescFromMonto(idx){
      const p = productosCaja[idx];
      const sub = lineaSubTotal(p);
      const monto = lineaDescMonto(p);
      const pct = sub > 0 ? (monto/sub)*100 : 0;
      p.descPct = pct.toFixed(2);
    }

    function onLineaDescPctChange(idx, v){
      if (_descLock) return;
      _descLock = true;
      productosCaja[idx].descPct = v;
      syncDescFromPct(idx);
      _descLock = false;
      renderTablaCajaProductos();
      recalcularTotalesCaja();
    }

    function onLineaDescMontoChange(idx, v){
      if (_descLock) return;
      _descLock = true;
      productosCaja[idx].descMonto = v;
      syncDescFromMonto(idx);
      _descLock = false;
      renderTablaCajaProductos();
      recalcularTotalesCaja();
    }

    function updateProductoCaja(idx, field, value) {
      productosCaja[idx][field] = value;

      if (['cantidad','precioUnitario'].includes(field)) {
        const sub = lineaSubTotal(productosCaja[idx]);
        const d = _n(productosCaja[idx].descMonto);
        if (d > sub) productosCaja[idx].descMonto = sub.toFixed(2);
        syncDescFromMonto(idx);
      }

      renderTablaCajaProductos();
      recalcularTotalesCaja();

    function buscarProductoCajaAutocompletado(idx) {
      clearTimeout(productosCaja[idx]?.__t);
      const input = document.getElementById(`productoCaja-${idx}`);
      const dropdown = document.getElementById(`autocompleteDropdownCaja-${idx}`);
      const codigo = (input?.value || '').trim().toUpperCase();
      if (!codigo) { if (dropdown) dropdown.style.display = 'none'; return; }
      productosCaja[idx].__t = setTimeout(() => {
        const tipo = productosCaja[idx].tipoItem;
        if (tipo === 'KIT') { google.script.run.withSuccessHandler(kits => mostrarAutocompletadoCaja(idx, kits, true)).buscarKitPorCodigo(codigo); }

      productosCaja.forEach((p, i) => {

        const disp = esKit ? (kitsMap[p.producto]?.disponible ?? '-') : '';
        const imp = lineaImporte(p);

                placeholder="${esKit ? 'Código del kit' : 'Código del producto'}"
                onkeyup="buscarProductoCajaAutocompletado(${i})"
                onblur="ocultarAutocompletadoCaja(${i})"
                onfocus="mostrarAutocompletadoCaja(${i}, [], ${esKit})">
              <div id="autocompleteDropdownCaja-${i}" class="autocomplete-dropdown"></div>
            </div>
          </td>
          <td><input type="number" min="0.01" step="0.01" value="${p.cantidad || ''}" oninput="updateProductoCaja(${i}, 'cantidad', this.value)"></td>
         <td>
  <input
    type="number"
    readonly
    style="background:#f5f5f5;width:110px;"

</td>
          <td><input type="number" min="0" step="0.01" value="${p.descPct ?? '0'}" oninput="onLineaDescPctChange(${i}, this.value)" style="width:90px;"></td>
          <td><input type="number" min="0" step="0.01" value="${p.descMonto ?? '0'}" oninput="onLineaDescMontoChange(${i}, this.value)" style="width:110px;"></td>

    function recalcularTotalesCaja() {
      let subTotal = 0;
      let descuento = 0;

      productosCaja.forEach(p => {
        subTotal += lineaSubTotal(p);
        descuento += lineaDescMonto(p);
      });

      const ivaPct = Math.max(0, _n(document.getElementById("ventaIvaPct")?.value));
      const base = Math.max(0, subTotal - descuento);
      const iva = base * (ivaPct/100);
      const total = base + iva;

      const st = document.getElementById("ventaSubTotal");
      const ds = document.getElementById("ventaDescuentoTotal");
      const iv = document.getElementById("ventaIvaMonto");
      const tt = document.getElementById("ventaTotal");

      if (st) st.value = subTotal.toFixed(2);
      if (ds) ds.value = descuento.toFixed(2);
      if (iv) iv.value = iva.toFixed(2);
      if (tt) tt.value = total.toFixed(2);
    }

    function guardarCaja(e) {
      e.preventDefault();
      if (guardandoCaja) { showMessage('msgCaja', 'Guardado en progreso...', 'info'); return; }

      const cabecera = {
        idRegistro: document.getElementById('cajaId').value.trim(),
        cliente: document.getElementById('cajaCliente').value.trim(),
        agente: document.getElementById('cajaAgente').value.trim(),
        obra: document.getElementById('cajaObra').value.trim(),
        remision: document.getElementById('cajaRemision').value.trim(),
        tipo: document.getElementById('cajaTipo').value,
        fechaCaptura: document.getElementById('cajaFecha').value
      };

      if (!cabecera.cliente) { showMessage('msgCaja', 'Cliente es obligatorio', 'error'); return; }
      if (productosCaja.length === 0) { showMessage('msgCaja', 'Agregue al menos un producto o kit', 'error'); return; }

      const errores = [];

      // Construir payload con expansión + prorrateo por valor (precio base)
      const prepararPayload = (preciosMap = {}) => {
        const productosPayload = [];

        for (let idx = 0; idx < productosCaja.length; idx++) {
          const item = productosCaja[idx];
          const linea = idx + 1;

          if (!item.producto) { errores.push(`Línea ${linea}: producto requerido`); continue; }

          const cantBase = _n(item.cantidad);
          if (!(cantBase > 0)) { errores.push(`Línea ${linea}: cantidad inválida`); continue; }

          const puLineaCapt = _n(item.precioUnitario);
          if (!(puLineaCapt >= 0)) { errores.push(`Línea ${linea}: precio inválido`); continue; }

          if (cabecera.tipo === 'SALIDA_X_RENTA') {
            if (!item.fechaInicio || !item.fechaFin) errores.push(`Línea ${linea}: fechas requeridas`);
            if (item.fechaInicio && item.fechaFin && new Date(item.fechaInicio) > new Date(item.fechaFin)) errores.push(`Línea ${linea}: fecha inicio > fecha fin`);
          }

          const subCab = cantBase * puLineaCapt;
          let descMontoCab = Math.max(0, _n(item.descMonto));
          if (descMontoCab > subCab) descMontoCab = subCab;
          const descPctCab = subCab > 0 ? (descMontoCab / subCab) * 100 : 0;

          if (item.tipoItem === 'KIT') {
            if (!item.componentes || item.componentes.length === 0) { errores.push(`Línea ${linea}: kit sin componentes`); continue; }

            // prorrateo por valor: valorComp = (cantCompEnKit * precioProductoBase)
            let totalValor = 0;
            const comps = item.componentes.map(c => {
              const cod = String(c.codigo || '').toUpperCase();
              const cantCompKit = _n(c.cantidad);
              const cantCompReal = cantCompKit * cantBase;
              const precioBase = _n(preciosMap[cod]); // desde hoja Productos
              const valor = cantCompReal * precioBase;
              totalValor += valor;
              return { cod, cantCompReal, valor };
            });

            // fallback si no hay precios base (todo 0): prorrateo por cantidad
            if (!(totalValor > 0)) {
              totalValor = comps.reduce((s, x) => s + x.cantCompReal, 0);
              comps.forEach(x => { x.valor = x.cantCompReal; });
            }
            if (!(totalValor > 0)) { errores.push(`Línea ${linea}: no se pudo prorratear kit (valores 0)`); continue; }

            comps.forEach(x => {
              const ratio = x.valor / totalValor;
              const subLinea = subCab * ratio;
              const descLinea = descMontoCab * ratio;
              const impLinea = Math.max(0, subLinea - descLinea);
              const puEfectivo = x.cantCompReal > 0 ? (subLinea / x.cantCompReal) : 0;

              productosPayload.push({
                producto: x.cod,
                cantidad: x.cantCompReal,
                fechaInicio: item.fechaInicio || '',
                fechaFin: item.fechaFin || '',
                esKit: true,
                kitCodigo: item.producto,

                precioUnitario: Number(puEfectivo.toFixed(2)),
                descPct: Number(descPctCab.toFixed(2)),
                descMonto: Number(descLinea.toFixed(2)),
                subTotalLinea: Number(subLinea.toFixed(2)),
                importeLinea: Number(impLinea.toFixed(2))
              });
            });

          } else {
            // Producto normal
            const subLinea = subCab;
            const descLinea = descMontoCab;
            const impLinea = Math.max(0, subLinea - descLinea);

            productosPayload.push({
              producto: String(item.producto || '').toUpperCase(),
              cantidad: cantBase,
              fechaInicio: item.fechaInicio || '',
              fechaFin: item.fechaFin || '',
              esKit: false,
              kitCodigo: '',

              precioUnitario: Number(puLineaCapt.toFixed(2)),
              descPct: Number(descPctCab.toFixed(2)),
              descMonto: Number(descLinea.toFixed(2)),
              subTotalLinea: Number(subLinea.toFixed(2)),
              importeLinea: Number(impLinea.toFixed(2))
            });
          }
        }

        return productosPayload;
      };

      // 1) Para prorrateo de kits por valor, necesitamos precios base de códigos componentes
      const codigosComponentes = [];
      productosCaja.forEach(it => {
        if (it.tipoItem === 'KIT' && Array.isArray(it.componentes)) {
          it.componentes.forEach(c => {
            const cod = String(c.codigo || '').trim().toUpperCase();
            if (cod) codigosComponentes.push(cod);
          });
        }
      });
      const uniqueCods = Array.from(new Set(codigosComponentes));

      guardandoCaja = true;
      const btn = document.getElementById('btnCajaGuardar');
      if (btn) btn.disabled = true;

      const finalizar = () => { guardandoCaja = false; if (btn) btn.disabled = false; };

      const ejecutarGuardar = (preciosMap) => {
        const productosPayload = prepararPayload(preciosMap || {});
        if (errores.length) { showMessage('msgCaja', errores.join(' | '), 'error'); finalizar(); return; }

        google.script.run.withSuccessHandler(res => {
          if (res.ok) { showMessage('msgCaja', `Caja registrada. ID: ${res.idRegistro}`, 'success'); limpiarFormCaja(); }
          else { showMessage('msgCaja', 'Errores: ' + (res.errores || []).join(' | '), 'error'); }
          finalizar();
        }).withFailureHandler(err => {
          showMessage('msgCaja', 'Error: ' + err, 'error');
          finalizar();
        }).registrarCaja({ cabecera, productos: productosPayload });
      };

      if (uniqueCods.length > 0) {
        google.script.run.withSuccessHandler(map => ejecutarGuardar(map))
          .withFailureHandler(_ => ejecutarGuardar({}))
          .obtenerPreciosProductos(uniqueCods);
      } else {
        ejecutarGuardar({});
      }
    }

    function renderRentaDetalle() {
      const resDiv = document.getElementById('resumenRenta');
      const tDiv = document.getElementById('tablaRentaDetalle');
      const btnGuardar = document.querySelector('button[onclick="guardarCheckRenta(event)"]');

      if (!rentaCargada) return;

      const r = rentaCargada;
      resDiv.innerHTML = `<div style="background:#f0f8fc;padding:15px;border-radius:8px;margin-bottom:15px;"><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;"><div><strong>ID:</strong> ${r.id}</div><div><strong>Cliente:</strong> ${r.cliente || '-'}</div><div><strong>Fecha:</strong> ${r.fechaCaptura || '-'}</div><div><strong>Obra:</strong> ${r.obra || '-'}</div></div></div>`;

      let html = `<table><thead><tr><th>#</th><th>Producto</th><th>Esperado</th><th>Bueno</th><th>Dañado</th><th>Total</th><th>Estado</th><th>Comentarios</th></tr></thead><tbody>`;
      let hayErrores = false;

      lineasCheck.forEach((l, i) => {
        const bueno = parseFloat(l.bueno) || 0;
        const danado = parseFloat(l.danado) || 0;
        const total = bueno + danado;

        const esEntero = Number.isInteger(l.cantidad);
        const step = esEntero ? "1" : "0.01";
        const preventDecimals = esEntero ? 'onkeypress="return (event.charCode >= 48 && event.charCode <= 57)"' : '';

        let colEstado = '';
        const diferencia = l.cantidad - total;
        let rowStyle = '';

        if (total > l.cantidad + 0.001) {
          const sobrante = (total - l.cantidad).toFixed(esEntero ? 0 : 2);
          colEstado = `<span style="color:#dc3545; font-weight:bold;">🚫 Excede por ${sobrante}</span>`;
          hayErrores = true;
          l.faltante = 0;
          rowStyle = 'style="background-color:#ffe6e6;"';
        }
        else if (diferencia > 0.001) {
          l.faltante = Number(diferencia.toFixed(2));
          colEstado = `<strong class="faltante-neg">Falta: ${l.faltante.toFixed(esEntero ? 0 : 2)}</strong>`;
        }
        else {
          l.faltante = 0;
          colEstado = `<span class="text-success">✓ Completo</span>`;
        }

        html += `<tr ${rowStyle}>
          <td>${i + 1}</td>
          <td><strong>${l.codigo}</strong><br><span style="font-size:0.8em;color:#666">${l.nombre || ''}</span>${l.kitCodigo ? `<br><span class="badge badge-kit">Kit ${l.kitCodigo}</span>` : ''}</td>
          <td style="font-size:1.1em;text-align:center;">${l.cantidad}</td>
          <td><input type="number" min="0" step="${step}" ${preventDecimals} value="${l.bueno}" oninput="onChangeLinea(${i}, 'bueno', this.value)" style="width:70px;text-align:center;"></td>
          <td><input type="number" min="0" step="${step}" ${preventDecimals} value="${l.danado}" oninput="onChangeLinea(${i}, 'danado', this.value)" style="width:70px;text-align:center;"></td>
          <td style="font-weight:bold;text-align:center;">${total.toFixed(esEntero ? 0 : 2)}</td>
          <td style="text-align:center;">${colEstado}</td>
          <td><input type="text" value="${l.comentario || ''}" oninput="onChangeLinea(${i}, 'comentario', this.value)" placeholder="..."></td>
        </tr>`;
      });

      html += '</tbody></table>';
      tDiv.innerHTML = html;

      if (btnGuardar) {
        if (hayErrores) {
          btnGuardar.disabled = true;
          btnGuardar.textContent = "🚫 Corrija los excesos";
          btnGuardar.style.opacity = "0.6";
          btnGuardar.style.cursor = "not-allowed";
        } else {
          btnGuardar.disabled = false;
          btnGuardar.textContent = "Guardar check";
          btnGuardar.style.opacity = "1";
          btnGuardar.style.cursor = "pointer";
        }
      }
    }

    function onChangeLinea(idx, field, value) {
      const l = lineasCheck[idx];
      if (field === 'comentario') { l.comentario = value; return; }

      let num = parseFloat(value);
      if (isNaN(num) || num < 0) num = 0;

      if (l.cantidad % 1 === 0) {
        if (num % 1 !== 0) num = Math.floor(num);

      if (field === 'bueno') l.bueno = num;
      if (field === 'danado') l.danado = num;

    function guardarCheckVentaModal(event) {
      if (!ventaCargada) return;

      btn.disabled = true; btn.textContent = 'Guardando...';
      const payload = {
        id: ventaCargada.id,

    function getSaldoPendienteHtml() {
      if (!ventaCargada) return '-';
      if (ventaCargada.estadoPago === 'SIN_SALDO') {
        return '<strong>Saldo pendiente:</strong> <span style="color:#28a745;font-weight:700;font-size:1.1em;">$0.00 ✅</span>';
      }
      const saldo = ventaCargada.saldo || 0;
      if (saldo <= 0) {
        return '<strong>Saldo pendiente:</strong> <span style="color:#28a745;font-weight:700;font-size:1.1em;">$0.00</span> <small style="color:#ffc107;font-weight:600;">(pendiente de marcar SIN SALDO)</small>';
      }
      return `<strong>Saldo pendiente:</strong> <span style="color:#dc3545;font-weight:700;font-size:1.1em;">$${saldo.toFixed(2)}</span>`;
    }

    function renderTransacciones(depositos) {
      const container = document.getElementById('tablaTransacciones');
      if (!container) return;
      if (!depositos || depositos.length === 0) {
        container.innerHTML = `
          <div style="background:#e8f4f8;padding:12px 15px;border-radius:8px;margin-bottom:12px;">
            ${getSaldoPendienteHtml()}
          </div>
          <div class="message info">No hay depósitos registrados para esta venta.</div>`;
        return;
      }
      const totalDep = depositos.reduce((s, d) => s + d.monto, 0);
      let rows = depositos.map((d, i) => `<tr>
        <td>${i + 1}</td>
        <td>${d.fecha}</td>
        <td style="text-align:right;font-weight:600;color:#17a2b8;">$${d.monto.toFixed(2)}</td>
        <td><span class="badge badge-pend">${d.tipo}</span></td>
        <td>${d.comentario || '-'}</td>
        <td style="font-size:0.8em;color:#6c757d;">${d.usuario}</td>
      </tr>`).join('');
      container.innerHTML = `
        <div style="background:#e8f4f8;padding:12px 15px;border-radius:8px;margin-bottom:12px;display:flex;gap:30px;align-items:center;flex-wrap:wrap;">
          <div><strong>Total depositado:</strong> <span style="color:#17a2b8;font-weight:700;font-size:1.1em;">$${totalDep.toFixed(2)}</span></div>
          <div>${getSaldoPendienteHtml()}</div>

        <div class="table-container">
          <table>
            <thead><tr><th>#</th><th>Fecha</th><th>Monto</th><th>Tipo</th><th>Referencia</th><th>Usuario</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>

    function registrarDepositoUI(event) {
      if (!ventaCargada) return;
      const btn = event.target;
      const monto = parseFloat(document.getElementById('depositoMonto').value);
      const tipo = document.getElementById('depositoTipo').value;
      const comentario = document.getElementById('depositoComentario').value.trim();
      if (!monto || monto <= 0) { showMessage('msgDeposito', 'Ingrese un monto válido mayor a cero.', 'warning'); return; }

      btn.disabled = true; btn.textContent = 'Guardando...';
      const payload = { ventaId: ventaCargada.id, monto, tipo, comentario };

      google.script.run.withSuccessHandler(res => {
        btn.disabled = false; btn.textContent = '💾 Registrar Depósito';

          showMessage('msgDeposito', 'Depósito registrado exitosamente.', 'success');
          document.getElementById('depositoMonto').value = '';
          document.getElementById('depositoComentario').value = '';
          google.script.run.withSuccessHandler(venta => {
            if (venta) {
              ventaCargada = venta;
              renderVentaDetalle();
              renderTransacciones(ventaCargada.depositos || []);
            }
          }).obtenerVentaPorId(ventaCargada.id);
          listarVentas();
        } else {
          showMessage('msgDeposito', 'Error: ' + (res.error || 'desconocido'), 'error');
        }
      }).withFailureHandler(err => {
        btn.disabled = false; btn.textContent = '💾 Registrar Depósito';
        showMessage('msgDeposito', 'Error de red: ' + err, 'error');
      }).registrarDeposito(payload);

    /* ------------------- LOGO: Selección/Subida ------------------- */
    function onLogoSelected() {
      const input = document.getElementById('paramLogoFile');
      const file = input?.files?.[0];
      const msg = document.getElementById('msgLogo');
      const prev = document.getElementById('logoPreview');

      logoSeleccionado = null;

      if (!file) {
        if (prev) prev.style.display = 'none';
        if (msg) msg.innerHTML = '';
        return;
      }

      if (!['image/png', 'image/jpeg'].includes(file.type)) {
        if (msg) msg.innerHTML = '<span style="color:red">Solo PNG o JPG</span>';
        input.value = '';
        if (prev) prev.style.display = 'none';
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        const base64 = reader.result;
        logoSeleccionado = { base64, mimeType: file.type };
        if (prev) { prev.src = base64; prev.style.display = 'block'; }
        if (msg) msg.innerHTML = '<span style="color:#2E86AB">Logo listo para subir.</span>';
      };
      reader.readAsDataURL(file);
    }

    function limpiarLogoSeleccionado() {
      const input = document.getElementById('paramLogoFile');
      const prev = document.getElementById('logoPreview');
      const msg = document.getElementById('msgLogo');
      if (input) input.value = '';
      if (prev) { prev.src = ''; prev.style.display = 'none'; }
      if (msg) msg.innerHTML = '';
      logoSeleccionado = null;
    }

    function subirLogoDesdeModal() {
      const msg = document.getElementById('msgLogo');
      if (!logoSeleccionado) {
        if (msg) msg.innerHTML = '<span style="color:#dc3545">Seleccione un archivo primero.</span>';
        return;
      }
      if (msg) msg.innerHTML = '<span style="color:#2E86AB">Subiendo a Drive...</span>';

      google.script.run
        .withSuccessHandler(res => {
          if (!res || !res.ok) {
            if (msg) msg.innerHTML = '<span style="color:#dc3545">Error: ' + (res?.mensaje || 'desconocido') + '</span>';
            return;
          }
          if (msg) msg.innerHTML = '<span style="color:green;font-weight:700">✓ Logo subido</span>';
          aplicarLogoEnUI(res.logoUrl);
          logoSeleccionado = null;
          const input = document.getElementById('paramLogoFile');
          if (input) input.value = '';
        })
        .withFailureHandler(err => {
          if (msg) msg.innerHTML = '<span style="color:#dc3545">Falla: ' + err + '</span>';
        })
        .subirLogoEmpresa(logoSeleccionado);
    }
  </script>
